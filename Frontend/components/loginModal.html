<div id="loginModal" class="modal-overlay">
    <div class="modal-box">
        <h2>Login to Gmail</h2>

        <input id="gmailInput" type="email" placeholder="Your Gmail" />
        <input id="appPassInput" type="password" placeholder="Gmail App Password" />

        <div id="loginError" class="modal-error"></div>

        <div class="modal-actions">
            <button id="saveLoginBtn" class="modal-btn primary">Login</button>
            <button id="cancelLoginBtn" class="modal-btn secondary">Cancel</button>
        </div>
    </div>
</div>
